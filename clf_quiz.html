<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>AWS CLF 객관식</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f5f5f0;color:#1a1a1a;min-height:100vh;}
.topbar{background:#232f3e;color:#fff;padding:14px 16px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;}
.topbar h1{font-size:16px;font-weight:600;}
.topbar .ver{font-size:11px;color:#ff9900;font-weight:600;}
.score-row{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;padding:12px 16px;background:#fff;border-bottom:1px solid #e8e8e0;}
.scard{text-align:center;padding:8px 4px;border-radius:8px;background:#f8f8f4;}
.scard .n{font-size:20px;font-weight:700;}
.scard .l{font-size:10px;color:#888;margin-top:1px;}
.n.c{color:#1a8a5e;} .n.w{color:#d93025;} .n.r{color:#f29900;}
.domain-row{display:flex;gap:6px;padding:12px 16px;overflow-x:auto;background:#fff;border-bottom:1px solid #e8e8e0;}
.domain-row::-webkit-scrollbar{display:none;}
.dbtn{padding:7px 14px;border-radius:20px;border:1.5px solid #ddd;background:#fff;font-size:12px;white-space:nowrap;cursor:pointer;font-weight:500;color:#555;}
.dbtn.active{background:#232f3e;color:#fff;border-color:#232f3e;}
.prog-wrap{padding:10px 16px 12px;background:#fff;}
.prog-bar{height:4px;background:#e8e8e0;border-radius:99px;overflow:hidden;}
.prog-fill{height:100%;background:#1a8a5e;border-radius:99px;transition:width .3s;}
.prog-txt{font-size:11px;color:#888;margin-top:4px;text-align:right;}
.q-wrap{padding:12px 16px 120px;}
.q-card{background:#fff;border-radius:12px;padding:16px;border:1px solid #e8e8e0;}
.dtag{display:inline-block;font-size:11px;font-weight:600;padding:3px 10px;border-radius:20px;margin-bottom:10px;}
.t3{background:#e8f4fd;color:#1565c0;} .t2{background:#fff3e0;color:#e65100;} .t1{background:#e8f5e9;color:#2e7d32;}
.qnum{font-size:11px;color:#aaa;margin-bottom:6px;}
.qtext{font-size:15px;line-height:1.7;color:#1a1a1a;margin-bottom:16px;font-weight:500;}
.opt{display:block;width:100%;text-align:left;padding:13px 14px;border-radius:10px;border:1.5px solid #e0e0e0;background:#fafaf8;font-size:14px;line-height:1.5;margin-bottom:8px;cursor:pointer;color:#1a1a1a;transition:all .15s;}
.opt:active{transform:scale(.98);}
.opt.selected{border-color:#232f3e;background:#f0f4f8;}
.opt.correct{border-color:#1a8a5e;background:#e8f5e9;color:#1b5e20;font-weight:600;}
.opt.wrong{border-color:#d93025;background:#ffebee;color:#b71c1c;}
.opt.reveal{border-color:#1a8a5e;background:#e8f5e9;color:#1b5e20;}
.explanation{margin-top:14px;padding:12px 14px;border-radius:10px;font-size:13px;line-height:1.7;}
.ex-ok{background:#e8f5e9;border:1px solid #a5d6a7;color:#1b5e20;}
.ex-ng{background:#fff3e0;border:1px solid #ffcc80;color:#e65100;}
.ex-kw{font-weight:700;}
.nav-row{position:fixed;bottom:0;left:0;right:0;display:flex;gap:10px;padding:12px 16px 20px;background:#fff;border-top:1px solid #e8e8e0;z-index:50;}
.nav-btn{flex:1;padding:13px;border-radius:10px;border:1.5px solid #ddd;background:#fff;font-size:14px;font-weight:600;color:#333;cursor:pointer;}
.nav-btn:disabled{opacity:.3;}
.nav-btn.active-nav{background:#ff9900;color:#fff;border-color:#ff9900;}
.empty{text-align:center;padding:60px 20px;color:#aaa;font-size:15px;}
.round-badge{font-size:11px;color:#888;text-align:center;padding:6px 16px 10px;background:#fff;}
</style>
</head>
<body>

<div class="topbar">
  <h1>AWS CLF 시나리오 객관식</h1>
  <span class="ver">CLF-C02</span>
</div>

<div class="score-row">
  <div class="scard"><div class="n c" id="sc-c">0</div><div class="l">정답</div></div>
  <div class="scard"><div class="n w" id="sc-w">0</div><div class="l">오답</div></div>
  <div class="scard"><div class="n" id="sc-rem">0</div><div class="l">남음</div></div>
  <div class="scard"><div class="n r" id="sc-rate">0%</div><div class="l">정답률</div></div>
</div>

<div class="domain-row">
  <button class="dbtn active" onclick="setDomain('all')">전체</button>
  <button class="dbtn" onclick="setDomain('3')">도메인3</button>
  <button class="dbtn" onclick="setDomain('2')">도메인2</button>
  <button class="dbtn" onclick="setDomain('1')">도메인1</button>
  <button class="dbtn" onclick="setDomain('wrong')">오답만</button>
</div>

<div class="prog-wrap">
  <div class="prog-bar"><div class="prog-fill" id="prog-fill" style="width:0%"></div></div>
  <div class="prog-txt" id="prog-txt">0 / 0</div>
</div>
<div class="round-badge" id="round-badge">1회독 중</div>

<div class="q-wrap" id="q-area"></div>

<div class="nav-row">
  <button class="nav-btn" id="btn-prev" onclick="movePrev()" disabled>이전</button>
  <button class="nav-btn active-nav" onclick="resetQuiz()">처음부터</button>
  <button class="nav-btn" id="btn-next" onclick="moveNext()" disabled>다음</button>
</div>

<script>
const Q=[
  {d:'3',q:'한 스타트업이 트래픽 급증 시 서버를 자동으로 늘리고, 트래픽이 줄면 다시 줄이고 싶습니다. 어떤 기능을 사용해야 합니까?',opts:['Amazon CloudWatch','AWS Auto Scaling','AWS Lambda','Amazon EBS'],ans:1,ex:'Auto Scaling은 수요에 따라 EC2 인스턴스 수를 자동으로 조절합니다. CloudWatch는 모니터링, Lambda는 서버리스 실행, EBS는 스토리지입니다.'},
  {d:'3',q:'개발자가 서버 프로비저닝 없이 코드를 업로드하고 이벤트 발생 시에만 실행되는 환경을 원합니다. 가장 적합한 서비스는?',opts:['Amazon EC2','AWS Lambda','Amazon ECS','AWS Fargate'],ans:1,ex:'Lambda는 서버 없이 코드만 실행하는 서버리스 서비스입니다. EC2는 서버 직접 관리, ECS/Fargate는 컨테이너 실행입니다.'},
  {d:'3',q:'기업이 수백만 건의 이미지 파일을 저장해야 합니다. 가장 적합한 AWS 스토리지는?',opts:['Amazon EBS','Amazon EFS','Amazon S3','AWS Storage Gateway'],ans:2,ex:'S3는 객체 스토리지로 이미지·동영상 등 비정형 파일을 무제한 저장합니다. EBS는 EC2용 블록 스토리지, EFS는 공유 파일 시스템입니다.'},
  {d:'3',q:'5년 이상 보관하지만 거의 꺼낼 일 없는 백업 데이터를 가장 저렴하게 저장하려면?',opts:['S3 Standard','S3 Standard-IA','S3 Glacier','Amazon EBS'],ans:2,ex:'Glacier는 장기 아카이브용으로 S3 등급 중 가장 저렴합니다. Standard는 자주 접근, IA는 가끔 접근용입니다.'},
  {d:'3',q:'여러 EC2 인스턴스가 동시에 같은 파일을 읽고 써야 하는 공유 파일 시스템이 필요합니다.',opts:['Amazon EBS','Amazon S3','Amazon EFS','AWS Storage Gateway'],ans:2,ex:'EFS는 여러 EC2가 동시에 접근할 수 있는 공유 파일 시스템입니다. EBS는 하나의 EC2에만 연결됩니다.'},
  {d:'3',q:'웹 애플리케이션에 들어오는 HTTP 트래픽을 여러 EC2 인스턴스에 자동으로 분산하려면?',opts:['Amazon Route 53','Elastic Load Balancing','AWS Auto Scaling','Amazon CloudFront'],ans:1,ex:'ELB(Elastic Load Balancing)는 여러 EC2에 트래픽을 분산합니다. Route 53은 DNS, Auto Scaling은 인스턴스 수 조절, CloudFront는 CDN입니다.'},
  {d:'3',q:'관계형 데이터베이스 MySQL을 서버 관리 없이 AWS에서 운영하고 싶습니다.',opts:['Amazon DynamoDB','Amazon RDS','Amazon ElastiCache','Amazon Redshift'],ans:1,ex:'RDS는 MySQL 등 관계형 DB를 관리형으로 운영합니다. DynamoDB는 NoSQL, ElastiCache는 캐시입니다.'},
  {d:'3',q:'쇼핑몰 상품 목록처럼 반복적으로 조회되는 데이터를 빠르게 제공하기 위해 메모리 캐시를 도입하려 합니다.',opts:['Amazon RDS','Amazon DynamoDB','Amazon ElastiCache','Amazon Aurora'],ans:2,ex:'ElastiCache(Redis/Memcached)는 메모리 기반 캐시로 반복 쿼리 응답 속도를 높입니다.'},
  {d:'3',q:'IoT 센서에서 실시간으로 대량의 데이터가 들어옵니다. 이를 실시간으로 수집·처리하는 서비스는?',opts:['Amazon S3','Amazon Kinesis','Amazon Athena','AWS Glue'],ans:1,ex:'Kinesis는 실시간 스트리밍 데이터 수집·처리 서비스입니다. S3는 저장, Athena는 쿼리, Glue는 ETL입니다.'},
  {d:'3',q:'회사가 기존 온프레미스 Oracle DB를 AWS로 이전하려 합니다. DB 스키마 변환이 필요할 때 사용하는 도구는?',opts:['AWS DMS','AWS SCT','AWS Snowball','AWS Migration Hub'],ans:1,ex:'SCT(Schema Conversion Tool)는 이기종 DB 간 스키마 변환 도구입니다. DMS는 데이터 이전, Snowball은 물리 데이터 전송입니다.'},
  {d:'3',q:'AWS에서 나만의 가상 네트워크를 구성하고 서브넷, 라우팅을 직접 설정하려면?',opts:['AWS Direct Connect','Amazon VPC','AWS VPN','Amazon Route 53'],ans:1,ex:'VPC(Virtual Private Cloud)는 AWS에서 나만의 가상 네트워크를 구성하는 서비스입니다.'},
  {d:'3',q:'EC2 인스턴스 수준에서 인바운드·아웃바운드 트래픽을 제어하는 가상 방화벽은?',opts:['네트워크 ACL','보안 그룹','AWS WAF','AWS Shield'],ans:1,ex:'보안 그룹은 EC2 인스턴스 레벨의 방화벽으로 Stateful 방식입니다. 네트워크 ACL은 서브넷 레벨, WAF는 웹 방화벽입니다.'},
  {d:'3',q:'서브넷 레벨에서 트래픽을 제어하며 인바운드·아웃바운드를 각각 명시해야 하는 방화벽은?',opts:['보안 그룹','네트워크 ACL','AWS WAF','Amazon Inspector'],ans:1,ex:'네트워크 ACL은 서브넷 레벨의 Stateless 방화벽입니다. 보안 그룹은 EC2 레벨, Stateful입니다.'},
  {d:'3',q:'사용자가 example.com을 입력했을 때 EC2 인스턴스 IP로 연결해주는 서비스는?',opts:['Amazon CloudFront','Elastic Load Balancing','Amazon Route 53','AWS Direct Connect'],ans:2,ex:'Route 53은 AWS DNS 서비스로 도메인을 IP로 변환합니다. CloudFront는 CDN, ELB는 부하분산입니다.'},
  {d:'3',q:'온프레미스 데이터센터와 AWS를 인터넷이 아닌 전용 물리 회선으로 연결하고 싶습니다.',opts:['AWS VPN','AWS Direct Connect','Amazon CloudFront','Amazon VPC Peering'],ans:1,ex:'Direct Connect는 전용선으로 AWS와 연결합니다. VPN은 인터넷을 통한 암호화 연결입니다.'},
  {d:'3',q:'챗봇을 만들어 고객 상담을 자동화하려 합니다. 가장 적합한 AWS AI 서비스는?',opts:['Amazon SageMaker','Amazon Lex','Amazon Kendra','Amazon Rekognition'],ans:1,ex:'Lex는 음성·텍스트 기반 챗봇 제작 서비스입니다. SageMaker는 ML 모델 개발, Kendra는 검색, Rekognition은 이미지 인식입니다.'},
  {d:'3',q:'회사 내부 문서 수천 개에서 직원이 질문하면 관련 내용을 찾아주는 AI 검색 서비스가 필요합니다.',opts:['Amazon Lex','Amazon Kendra','Amazon Textract','AWS Glue'],ans:1,ex:'Kendra는 기업 내부 문서를 AI로 검색하는 엔터프라이즈 검색 서비스입니다.'},
  {d:'3',q:'S3에 저장된 수억 건의 로그 파일을 SQL로 직접 분석하려 합니다. 서버 없이 쿼리할 수 있는 서비스는?',opts:['Amazon Redshift','Amazon Athena','Amazon EMR','AWS Glue'],ans:1,ex:'Athena는 S3 데이터를 서버 없이 SQL로 직접 쿼리하는 서버리스 분석 서비스입니다.'},
  {d:'3',q:'Docker 컨테이너를 EC2 서버 없이 서버리스로 실행하려 합니다.',opts:['Amazon ECS with EC2','AWS Fargate','Amazon EKS','Amazon ECR'],ans:1,ex:'Fargate는 컨테이너를 서버리스로 실행합니다. EC2 인스턴스 관리가 필요 없습니다.'},
  {d:'3',q:'코드를 변경하면 자동으로 빌드·테스트·배포까지 이루어지는 파이프라인을 구성하려면?',opts:['AWS CodeBuild','AWS CodePipeline','AWS X-Ray','AWS CloudFormation'],ans:1,ex:'CodePipeline은 CI/CD 자동화 파이프라인 서비스입니다. CodeBuild는 빌드 단계, CloudFormation은 인프라 자동화입니다.'},
  {d:'3',q:'분산 마이크로서비스에서 요청이 어디서 느려지는지 추적하려 합니다.',opts:['Amazon CloudWatch','AWS X-Ray','AWS CloudTrail','Amazon Inspector'],ans:1,ex:'X-Ray는 분산 애플리케이션의 요청 흐름을 추적하는 서비스입니다.'},
  {d:'3',q:'Kubernetes 클러스터를 AWS에서 관리형으로 운영하려 합니다.',opts:['Amazon ECS','Amazon EKS','AWS Fargate','Amazon ECR'],ans:1,ex:'EKS(Elastic Kubernetes Service)는 Kubernetes를 AWS에서 관리형으로 운영합니다.'},
  {d:'3',q:'인프라를 YAML/JSON 코드로 정의하고 자동으로 생성·삭제하려 합니다.',opts:['AWS CodePipeline','AWS CloudFormation','AWS Systems Manager','AWS Config'],ans:1,ex:'CloudFormation은 코드로 AWS 인프라를 정의하고 자동 프로비저닝하는 IaC 서비스입니다.'},
  {d:'3',q:'S3에 저장된 오래된 데이터를 자동으로 Glacier로 이동시키는 설정은?',opts:['S3 Transfer Acceleration','S3 수명 주기 정책','S3 버전 관리','S3 복제'],ans:1,ex:'수명 주기 정책(Lifecycle Policy)으로 날짜 기준으로 자동 스토리지 등급 이동이 가능합니다.'},
  {d:'3',q:'정적 웹사이트 파일을 전 세계 사용자에게 빠르게 제공하기 위한 CDN 서비스는?',opts:['Amazon Route 53','Amazon CloudFront','AWS Global Accelerator','Elastic Load Balancing'],ans:1,ex:'CloudFront는 엣지 로케이션을 활용한 AWS CDN 서비스입니다.'},
  {d:'3',q:'머신러닝 모델을 처음부터 끝까지(데이터 준비→훈련→배포) 통합 지원하는 서비스는?',opts:['Amazon Rekognition','Amazon Lex','Amazon SageMaker','Amazon Comprehend'],ans:2,ex:'SageMaker는 ML 모델의 전체 라이프사이클을 지원하는 통합 플랫폼입니다.'},
  {d:'3',q:'여러 AWS 계정의 비용을 하나의 청구서로 통합하고 중앙에서 관리하려면?',opts:['AWS Cost Explorer','AWS Budgets','AWS Organizations','AWS Trusted Advisor'],ans:2,ex:'Organizations는 여러 AWS 계정을 통합 관리하며 통합 결제도 제공합니다.'},
  {d:'3',q:'월별 AWS 비용이 특정 금액을 초과하면 즉시 이메일 알림을 받으려면?',opts:['AWS Cost Explorer','AWS Budgets','Amazon CloudWatch','AWS Trusted Advisor'],ans:1,ex:'Budgets는 비용 임계값 설정 및 초과 시 알림 기능을 제공합니다.'},
  {d:'3',q:'비디오에서 얼굴·객체를 인식하고 부적절한 콘텐츠를 자동 탐지하려면?',opts:['Amazon Textract','Amazon Rekognition','Amazon Comprehend','Amazon Transcribe'],ans:1,ex:'Rekognition은 이미지·비디오에서 객체, 얼굴, 텍스트, 부적절 콘텐츠를 인식합니다.'},
  {d:'3',q:'회의 녹음 파일을 텍스트로 자동 변환하려 합니다.',opts:['Amazon Polly','Amazon Translate','Amazon Transcribe','Amazon Textract'],ans:2,ex:'Transcribe는 음성을 텍스트로 변환하는 STT 서비스입니다. Polly는 반대(TTS)입니다.'},
  {d:'3',q:'스캔한 PDF 계약서에서 날짜, 금액 등 구조화된 데이터를 자동 추출하려면?',opts:['Amazon Rekognition','Amazon Textract','Amazon Comprehend','Amazon Kendra'],ans:1,ex:'Textract는 문서에서 텍스트와 구조화된 데이터를 자동 추출하는 OCR+ 서비스입니다.'},
  {d:'2',q:'AWS 데이터센터 물리 보안에 대한 책임은 누구에게 있습니까?',opts:['고객','AWS','고객과 AWS 공동','해당 리전 정부'],ans:1,ex:'공동 책임 모델에서 데이터센터 물리 보안, 하드웨어는 AWS의 책임입니다.'},
  {d:'2',q:'EC2 인스턴스에서 OS 패치를 적용하지 않아 보안 침해가 발생했습니다. 책임은?',opts:['AWS','고객','클라우드 공급업체','해당 없음'],ans:1,ex:'EC2(IaaS)에서 OS 패치는 고객 책임입니다. AWS는 하이퍼바이저 아래만 책임집니다.'},
  {d:'2',q:'RDS 데이터베이스 엔진 패치를 적용하는 책임은 누구에게 있습니까?',opts:['고객','AWS','DBA','운영팀'],ans:1,ex:'RDS는 관리형 서비스로 DB 엔진 패치는 AWS 책임입니다. 고객은 데이터·접근 권한만 책임집니다.'},

  {d:'3',q:'AWS에서 NoSQL 데이터베이스가 필요하고 밀리초 응답과 무제한 확장이 요구됩니다.',opts:['Amazon RDS','Amazon Aurora','Amazon DynamoDB','Amazon ElastiCache'],ans:2,ex:'DynamoDB는 키-값 NoSQL로 밀리초 응답과 수평 확장을 제공합니다.'},
  {d:'2',q:'보안 모범 사례 점검, 비용 최적화, 성능 개선 권장 사항을 제공하는 서비스는?',opts:['AWS Config','Amazon Inspector','AWS Trusted Advisor','AWS Security Hub'],ans:2,ex:'Trusted Advisor는 보안·비용·성능·내결함성·서비스 한도를 자동 점검하고 권고합니다.'},
  {d:'2',q:'고객 애플리케이션의 사용자 가입·로그인·소셜 인증을 구현하려면?',opts:['AWS IAM','Amazon Cognito','AWS Directory Service','AWS SSO'],ans:1,ex:'Cognito는 모바일·웹 앱의 사용자 인증, 소셜 로그인, 사용자 풀 관리를 제공합니다.'},
  {d:'1',q:'"특정 앱이 레거시 시스템에 종속되어 있어 당분간 이전하지 않기로 결정"하는 전략은?',opts:['Retire','Retain','Rehost','Repurchase'],ans:1,ex:'Retain은 이전 준비가 안 된 앱을 현재 환경에 유지하는 전략입니다.'},
  {d:'1',q:'"이 앱은 더 이상 사용하지 않으므로 클라우드 이전 없이 폐기"하는 전략은?',opts:['Retain','Repurchase','Retire','Replatform'],ans:2,ex:'Retire는 불필요한 앱을 폐기하는 전략으로 이전 대상에서 제외됩니다.'},
  {d:'3',q:'Amazon S3, EC2, RDS 등 다양한 서비스의 백업을 하나의 서비스에서 중앙 관리하려면?',opts:['Amazon S3 수명 주기','AWS Backup','AWS DataSync','AWS Storage Gateway'],ans:1,ex:'AWS Backup은 여러 AWS 서비스의 백업을 중앙에서 자동화하고 관리합니다.'},
  {d:'3',q:'애플리케이션에서 메시지를 보내면 여러 구독자(SQS, Lambda, 이메일)에게 동시에 전달하는 서비스는?',opts:['Amazon SQS','Amazon SNS','Amazon EventBridge','Amazon Kinesis'],ans:1,ex:'SNS(Simple Notification Service)는 pub/sub 방식으로 여러 구독자에게 메시지를 동시 전달합니다.'},
  {d:'3',q:'마이크로서비스 간 메시지를 큐에 저장해 처리 속도 차이를 완충하는 서비스는?',opts:['Amazon SNS','Amazon SQS','Amazon Kinesis','AWS Step Functions'],ans:1,ex:'SQS(Simple Queue Service)는 메시지 큐 서비스로 시스템 간 디커플링을 제공합니다.'},
];

let domain='all', idx=0, checked={}, wrong=new Set();

function getFiltered(){
  if(domain==='wrong') return [...wrong].map(i=>({...Q[i],orig:i}));
  if(domain==='all') return Q.map((q,i)=>({...q,orig:i}));
  return Q.map((q,i)=>({...q,orig:i})).filter(q=>q.d===domain);
}

let filtered=getFiltered();

function setDomain(d){
  domain=d;
  document.querySelectorAll('.dbtn').forEach((b,i)=>{b.classList.toggle('active',['all','3','2','1','wrong'][i]===d);});
  filtered=getFiltered(); idx=0; checked={};
  updateScore(); render();
}

function resetQuiz(){
  checked={}; wrong=new Set(); idx=0;
  filtered=getFiltered(); updateScore(); render();
}

function selectOpt(qi, oi){
  if(checked[qi]!==undefined) return;
  const q=filtered[qi];
  const correct=oi===q.ans;
  checked[qi]=correct;
  if(!correct) wrong.add(q.orig); else wrong.delete(q.orig);
  updateScore(); render();
}

function updateScore(){
  const total=filtered.length;
  const done=Object.keys(checked).length;
  const c=Object.values(checked).filter(v=>v).length;
  const w=Object.values(checked).filter(v=>!v).length;
  document.getElementById('sc-c').textContent=c;
  document.getElementById('sc-w').textContent=w;
  document.getElementById('sc-rem').textContent=total-done;
  document.getElementById('sc-rate').textContent=done>0?Math.round(c/done*100)+'%':'0%';
  document.getElementById('prog-fill').style.width=(total>0?done/total*100:0)+'%';
  document.getElementById('prog-txt').textContent=done+'/'+total;
  const r=done>0?Math.floor(done/total)+1:1;
  document.getElementById('round-badge').textContent=r+'회독 중 (총 '+total+'문제)';
}

function movePrev(){ if(idx>0){idx--;render();} }
function moveNext(){ if(idx<filtered.length-1){idx++;render();} }

function render(){
  filtered=getFiltered();
  if(idx>=filtered.length) idx=Math.max(0,filtered.length-1);
  const area=document.getElementById('q-area');
  if(filtered.length===0){area.innerHTML='<div class="empty">해당 문제가 없습니다.</div>';return;}
  const q=filtered[idx];
  const tc=q.d==='3'?'t3':q.d==='2'?'t2':'t1';
  const isCk=checked[idx]!==undefined;
  const isOk=checked[idx]===true;

  let opts='';
  q.opts.forEach((o,i)=>{
    let cls='opt';
    if(isCk){
      if(i===q.ans) cls+=' correct';
      else if(i===checked[idx]&&!isOk) cls+=' wrong';
    }
    const label=['A','B','C','D'][i];
    opts+=`<button class="${cls}" onclick="selectOpt(${idx},${i})">${label}. ${o}</button>`;
  });

  let exHtml='';
  if(isCk){
    exHtml=`<div class="explanation ${isOk?'ex-ok':'ex-ng'}">
      ${isOk?'✓ 정답!':'✗ 오답'}<br>${q.ex}
    </div>
    <div class="btn-row" style="margin-top:10px;">
      <button class="opt" style="text-align:center;color:#1a8a5e;font-weight:600;" onclick="moveNext()">다음 문제 →</button>
    </div>`;
  }

  area.innerHTML=`<div class="q-card">
    <span class="dtag ${tc}">도메인 ${q.d}</span>
    <div class="qnum">${idx+1} / ${filtered.length}</div>
    <div class="qtext">${q.q}</div>
    ${opts}${exHtml}
  </div>`;

  document.getElementById('btn-prev').disabled=idx===0;
  document.getElementById('btn-next').disabled=idx===filtered.length-1;
}

updateScore(); render();
</script>
</body>
</html>
